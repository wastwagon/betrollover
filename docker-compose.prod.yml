# BetRollover - Production stack for Coolify / VPS
# Use this file when deploying with Coolify (Docker Compose build pack)
#
# Safe defaults (will not break a live app):
# - Omit optional variables you do not use; `${VAR:-}` passes empty and the app falls back safely.
# - GTM / GA / extra social URLs: only load when you set the matching NEXT_PUBLIC_* and rebuild the web image.
# - CSP in next.config.js is Report-Only (does not block scripts).
# - Emergency: on the **web** service set DISABLE_THIRD_PARTY_TAGS=1 and restart (no rebuild) to disable GTM + direct GA.
#
# Setup in Coolify:
# 1. New Resource → Docker Compose
# 2. Connect your Git repo
# 3. Compose file: docker-compose.prod.yml (or leave default and rename)
# 4. Set env vars in Coolify (Project or Resource → Environment Variables)
# 5. Domains: web → betrollover.com (apex), api → api.betrollover.com — match NEXT_PUBLIC_APP_URL / APP_URL / CORS_ORIGINS
# 6. NEXT_PUBLIC_* for the browser: must be present at **web image build** time (build.args below). Changing them requires a **rebuild**.
# 7. Web build OOM on small VPS: see web/Dockerfile.prod and BUILD_NODE_MAX_OLD_SPACE_SIZE

services:
  postgres:
    image: postgres:16-alpine
    container_name: betrollover-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    # pg_stat_statements + checkpoint smoothing (same as docker-compose.yml)
    command:
      - postgres
      - -c
      - shared_preload_libraries=pg_stat_statements
      - -c
      - checkpoint_completion_target=0.9
      - -c
      - max_wal_size=2GB
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./database/init:/docker-entrypoint-initdb.d
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: betrollover-redis
    restart: unless-stopped
    volumes:
      - redis_data:/data
      - ./docker/redis/redis.conf:/etc/redis.conf:ro
    command: ["redis-server", "/etc/redis.conf"]
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  api:
    build:
      context: .
      dockerfile: backend/Dockerfile.prod
    container_name: betrollover-api
    restart: unless-stopped
    environment:
      NODE_ENV: production
      PORT: 3001
      POSTGRES_HOST: postgres
      POSTGRES_PORT: 5432
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
      DATABASE_URL: postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}
      REDIS_URL: redis://redis:6379
      JWT_SECRET: ${JWT_SECRET}
      API_SPORTS_KEY: ${API_SPORTS_KEY:-}
      API_SPORTS_PLAN: ${API_SPORTS_PLAN:-ultra}
      API_SYNC_LOOKAHEAD_DAYS: ${API_SYNC_LOOKAHEAD_DAYS:-3}
      API_MAX_ODDS_EVENTS_PER_RUN: ${API_MAX_ODDS_EVENTS_PER_RUN:-0}
      API_MAX_FOOTBALL_ODDS_FIXTURES: ${API_MAX_FOOTBALL_ODDS_FIXTURES:-0}
      API_MAX_LEAGUE_BACKFILL_PER_RUN: ${API_MAX_LEAGUE_BACKFILL_PER_RUN:-100}
      API_CALL_DELAY_MS: ${API_CALL_DELAY_MS:-50}
      API_PREDICTION_DELAY_MS: ${API_PREDICTION_DELAY_MS:-50}
      API_MAX_FIXTURES_UPDATE_PER_RUN: ${API_MAX_FIXTURES_UPDATE_PER_RUN:-200}
      CLEANUP_NO_ODDS_FIXTURES: ${CLEANUP_NO_ODDS_FIXTURES:-true}
      ODDS_API_KEY: ${ODDS_API_KEY:-}
      TENNIS_ODDS_API_KEY: ${TENNIS_ODDS_API_KEY:-}  # legacy fallback
      ENABLED_SPORTS: ${ENABLED_SPORTS:-football,basketball,rugby,mma,volleyball,hockey,american_football,tennis}
      PAYSTACK_SECRET_KEY: ${PAYSTACK_SECRET_KEY:-}
      PAYSTACK_PUBLIC_KEY: ${PAYSTACK_PUBLIC_KEY:-}
      PAYSTACK_WEBHOOK_SECRET: ${PAYSTACK_WEBHOOK_SECRET:-}
      SENDGRID_API_KEY: ${SENDGRID_API_KEY:-}
      SMTP_FROM: ${SMTP_FROM:-noreply@betrollover.com}
      APP_URL: ${APP_URL}
      CORS_ORIGINS: ${CORS_ORIGINS:-}
      VAPID_PUBLIC_KEY: ${VAPID_PUBLIC_KEY:-}
      VAPID_PRIVATE_KEY: ${VAPID_PRIVATE_KEY:-}
      ENABLE_SCHEDULING: ${ENABLE_SCHEDULING:-true}
      ENABLE_FOOTBALL_SYNC: ${ENABLE_FOOTBALL_SYNC:-true}
      LOG_LEVEL: ${LOG_LEVEL:-info}
      MIGRATIONS_PATH: /app/database/migrations
      SEEDS_PATH: /app/database/seeds
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3001/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  web:
    build:
      context: .
      dockerfile: web/Dockerfile.prod
      args:
        NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL}
        NEXT_PUBLIC_APP_URL: ${NEXT_PUBLIC_APP_URL}
        NEXT_PUBLIC_GTM_ID: ${NEXT_PUBLIC_GTM_ID:-}
        NEXT_PUBLIC_GA_MEASUREMENT_ID: ${NEXT_PUBLIC_GA_MEASUREMENT_ID:-}
        NEXT_PUBLIC_GOOGLE_CLIENT_ID: ${NEXT_PUBLIC_GOOGLE_CLIENT_ID:-}
        NEXT_PUBLIC_APPLE_CLIENT_ID: ${NEXT_PUBLIC_APPLE_CLIENT_ID:-}
        NEXT_PUBLIC_SENTRY_DSN: ${NEXT_PUBLIC_SENTRY_DSN:-}
        NEXT_PUBLIC_TELEGRAM_ADS_HANDLE: ${NEXT_PUBLIC_TELEGRAM_ADS_HANDLE:-}
        # Optional: raise if web build OOMs on a large builder (e.g. 2048). Lower only if host is tight.
        BUILD_NODE_MAX_OLD_SPACE_SIZE: ${BUILD_NODE_MAX_OLD_SPACE_SIZE:-1536}
    container_name: betrollover-web
    restart: unless-stopped
    environment:
      NODE_ENV: production
      NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL}
      NEXT_PUBLIC_APP_URL: ${NEXT_PUBLIC_APP_URL}
      NEXT_PUBLIC_GTM_ID: ${NEXT_PUBLIC_GTM_ID:-}
      NEXT_PUBLIC_GA_MEASUREMENT_ID: ${NEXT_PUBLIC_GA_MEASUREMENT_ID:-}
      NEXT_PUBLIC_GOOGLE_CLIENT_ID: ${NEXT_PUBLIC_GOOGLE_CLIENT_ID:-}
      NEXT_PUBLIC_APPLE_CLIENT_ID: ${NEXT_PUBLIC_APPLE_CLIENT_ID:-}
      NEXT_PUBLIC_SENTRY_DSN: ${NEXT_PUBLIC_SENTRY_DSN:-}
      NEXT_PUBLIC_TELEGRAM_ADS_HANDLE: ${NEXT_PUBLIC_TELEGRAM_ADS_HANDLE:-}
      # Web container calls API over internal Docker network (no need to add BACKEND_URL in Coolify)
      BACKEND_URL: http://api:3001
      # Optional: "1" = disable GTM + GA in the browser; restart only (server env, not NEXT_PUBLIC)
      DISABLE_THIRD_PARTY_TAGS: ${DISABLE_THIRD_PARTY_TAGS:-}
    depends_on:
      - api
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s

volumes:
  postgres_data:
  redis_data:
