# BetRollover — mounted by docker-compose (removes Redis "no config file" startup warning).
#
# Memory overcommit: Redis warns if the Linux host has vm.overcommit_memory=0 (fork during BGSAVE).
# Set on the VPS host (not inside the container): sysctl vm.overcommit_memory=1
# or echo 'vm.overcommit_memory = 1' | sudo tee /etc/sysctl.d/99-redis.conf && sudo sysctl --system

bind 0.0.0.0
protected-mode yes
port 6379
tcp-backlog 511
timeout 0
tcp-keepalive 300
loglevel notice
databases 16

# RDB snapshots (defaults aligned with vanilla redis.conf)
save 900 1
save 300 10
save 60 10000
stop-writes-on-bgsave-error yes
rdbcompression yes
rdbchecksum yes
dir /data

appendonly no
